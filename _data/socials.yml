# Social media links and contact information
# For more info, see: https://github.com/george-gca/jekyll-socials

# Uncomment and update the following with your information:
# cv_pdf: /assets/pdf/your_cv.pdf        # path to your CV PDF file
# email: your.email@example.com           # your email address
# rss_icon: true                          # show RSS feed icon

# Optional social media accounts:
# inspirehep_id: YOUR_ID                  # Inspire HEP author ID
# scholar_userid: YOUR_ID                 # Google Scholar ID
# wechat_qr: wechat-qr.png               # filename of WeChat QR code image
# whatsapp_number: +1234567890           # WhatsApp number (international format)

# Example custom social link:
# custom_social:
#   logo: https://example.com/logo.png
#   title: Custom Site
#   url: https://example.com/
